<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Hole — Playable ads showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #e8edf6;
        --bg-elevated: #ffffff;
        --sidebar-bg: rgba(255, 255, 255, 0.94);
        --border: rgba(15, 23, 42, 0.09);
        --border-strong: rgba(15, 23, 42, 0.16);
        --text: #0f172a;
        --muted: #64748b;
        --accent: #4f46e5;
        --accent-2: #0e7490;
        --accent-glow: rgba(79, 70, 229, 0.28);
        --item-active: rgba(79, 70, 229, 0.12);
        --sidebar-width: 288px;
        /* Короткая сторона корпуса (viewBox IPhone-17.svg: 72.5×150) */
        --phone-short-edge: min(352px, 52vw);
        --phone-aspect-w: 72.5;
        --phone-aspect-h: 150;
        /* Внешний корпус: rect layer9 в IPhone-17.svg (clip-path showcase-phone-hull-clip) */
        /* Запас под drop-shadow у .phone-device-shadow, иначе верх/низ режет overflow:hidden у .device-wrap */
        --phone-shadow-vpad: 44px;
        /* Подложка под макет телефона */
        --device-stage-edge: rgba(15, 23, 42, 0.1);
        --device-stage-glow: rgba(79, 70, 229, 0.16);
        --device-stage-glow-soft: rgba(14, 116, 144, 0.12);
        --network-chip-bg: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.98) 0%,
          rgba(241, 245, 249, 0.94) 100%
        );
        --network-chip-border: rgba(15, 23, 42, 0.1);
        --network-chip-text: rgba(30, 41, 59, 0.92);
      }

      * {
        box-sizing: border-box;
      }

      @keyframes showcase-float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(2%, -1.5%) scale(1.02);
        }
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family:
          'Outfit',
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      .layout {
        display: flex;
        align-items: stretch;
        min-height: 100vh;
        height: 100%;
      }

      .sidebar {
        width: var(--sidebar-width);
        min-width: var(--sidebar-width);
        height: 100vh;
        position: sticky;
        top: 0;
        display: flex;
        flex-direction: column;
        background: var(--sidebar-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-right: 1px solid var(--border);
        overflow: hidden;
        box-shadow: 8px 0 36px rgba(15, 23, 42, 0.07);
      }

      .sidebar-header {
        flex-shrink: 0;
        padding: 22px 18px 18px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(
          165deg,
          rgba(79, 70, 229, 0.06) 0%,
          transparent 55%
        );
      }

      .showcase-eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin: 0 0 12px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent-2);
        background: rgba(14, 116, 144, 0.1);
        border: 1px solid rgba(14, 116, 144, 0.22);
      }

      .showcase-eyebrow::before {
        content: '';
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent-2);
        box-shadow: 0 0 10px rgba(14, 116, 144, 0.45);
      }

      .sidebar-header h1 {
        margin: 0 0 12px;
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1.15;
        background: linear-gradient(105deg, #0f172a 0%, #334155 42%, #0369a1 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .sidebar-header .game-name {
        display: inline;
      }

      .variant-count-container {
        margin: 0;
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 6px 10px;
      }

      .variant-count {
        font-weight: 800;
        font-size: 1.5rem;
        line-height: 1;
        letter-spacing: -0.03em;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .sidebar-header .tagline {
        margin: 0;
        flex: 1 1 140px;
        min-width: 0;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--muted);
        line-height: 1.45;
      }

      .theme-list {
        flex: 1;
        overflow-y: auto;
        padding: 14px 12px 20px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: thin;
        scrollbar-color: rgba(79, 70, 229, 0.35) transparent;
      }

      .theme-list::-webkit-scrollbar {
        width: 6px;
      }

      .theme-list::-webkit-scrollbar-thumb {
        background: rgba(79, 70, 229, 0.35);
        border-radius: 999px;
      }

      .theme-item {
        position: relative;
        margin-bottom: 8px;
        padding: 14px 14px 14px 16px;
        font-size: 0.82rem;
        cursor: pointer;
        color: var(--muted);
        border-radius: 14px;
        border: 1px solid transparent;
        background: rgba(15, 23, 42, 0.035);
        transition:
          background 0.22s ease,
          border-color 0.22s ease,
          color 0.22s ease,
          transform 0.22s ease,
          box-shadow 0.22s ease;
      }

      .theme-item::before {
        content: '';
        position: absolute;
        left: 0;
        top: 10px;
        bottom: 10px;
        width: 3px;
        border-radius: 0 4px 4px 0;
        background: linear-gradient(180deg, var(--accent), var(--accent-2));
        opacity: 0;
        transform: scaleY(0.6);
        transition:
          opacity 0.22s ease,
          transform 0.22s ease;
      }

      .theme-item:hover {
        background: rgba(255, 255, 255, 0.82);
        border-color: var(--border);
        color: var(--text);
        transform: translateX(4px);
        box-shadow:
          0 10px 28px rgba(15, 23, 42, 0.08),
          0 0 0 1px rgba(255, 255, 255, 0.9) inset;
      }

      .theme-item:hover::before {
        opacity: 0.55;
        transform: scaleY(1);
      }

      .theme-item:focus-visible {
        outline: none;
        border-color: rgba(79, 70, 229, 0.45);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.22);
      }

      .theme-item.active {
        background: linear-gradient(
          135deg,
          rgba(79, 70, 229, 0.12) 0%,
          rgba(14, 116, 144, 0.06) 100%
        );
        border-color: rgba(79, 70, 229, 0.28);
        color: var(--text);
        box-shadow:
          0 14px 36px rgba(15, 23, 42, 0.08),
          0 0 20px var(--accent-glow),
          0 0 0 1px rgba(255, 255, 255, 0.85) inset;
        transform: translateX(4px);
      }

      .theme-item.active::before {
        opacity: 1;
        transform: scaleY(1);
      }

      .theme-item .line {
        display: block;
      }

      .theme-item .head {
        font-weight: 700;
        color: var(--text);
        margin-bottom: 6px;
        font-size: 0.9rem;
        letter-spacing: -0.01em;
      }

      .theme-item.active .head {
        color: var(--text);
      }

      .theme-item .meta {
        font-size: 0.74rem;
        line-height: 1.4;
        opacity: 0.92;
      }

      .preview-area {
        flex: 1;
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(248px, min(320px, 31vw));
        grid-template-rows: minmax(0, 1fr);
        gap: 0;
        height: 100vh;
        position: relative;
        background: var(--bg);
        overflow: hidden;
      }

      .bottom-section {
        position: relative;
        z-index: 1;
        flex-shrink: 0;
        min-width: 0;
        min-height: 0;
        margin: 0;
        padding: 18px 16px 20px;
        border-top: none;
        border-left: 1px solid var(--border);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.72) 0%,
          rgba(248, 250, 252, 0.96) 100%
        );
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .bottom-section-inner {
        max-width: none;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: center;
        gap: 20px;
      }

      .bottom-section-main {
        flex: 0 1 auto;
        min-width: 0;
        width: 100%;
        text-align: center;
      }

      .bottom-section-title {
        margin: 0 0 10px;
        font-size: 0.62rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent-2);
        line-height: 1.4;
        text-align: center;
      }

      .bottom-section-networks {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        gap: 8px 8px;
        justify-content: center;
      }

      .bottom-section-networks li {
        margin: 0;
        padding: 6px 14px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: clamp(11px, 1.1vw, 14px);
        font-weight: 600;
        color: var(--network-chip-text);
        background: var(--network-chip-bg);
        border: 1px solid var(--network-chip-border);
        border-radius: 999px;
        letter-spacing: 0.02em;
        white-space: nowrap;
        box-shadow:
          0 4px 14px rgba(15, 23, 42, 0.06),
          0 0 0 1px rgba(79, 70, 229, 0.06) inset;
      }

      /* Как на https://files.alconost.com/rVUdrfuYUzclWyCA1wLSd — .badge svg, .badge img */
      .bottom-section-networks li svg,
      .bottom-section-networks li img {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        display: block;
        object-fit: contain;
      }

      .bottom-section-cta {
        flex: 0 1 auto;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        width: 100%;
      }

      .bottom-section-cta-lead {
        margin: 28px 0 0;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--text);
        text-align: center;
      }

      .bottom-section-cta-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        box-sizing: border-box;
        padding: 10px 18px;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        text-decoration: none;
        color: #0a0b10;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 28px var(--accent-glow);
        transition:
          transform 0.15s ease,
          filter 0.15s ease;
      }

      .bottom-section-cta-link:hover {
        filter: brightness(1.06);
        transform: translateY(-1px);
      }

      .bottom-section-cta-link:focus-visible {
        outline: 2px solid var(--accent-2);
        outline-offset: 3px;
      }

      .preview-area::before {
        content: '';
        position: absolute;
        inset: -20%;
        background:
          radial-gradient(ellipse 55% 45% at 18% 22%, rgba(79, 70, 229, 0.14), transparent 55%),
          radial-gradient(ellipse 50% 40% at 88% 78%, rgba(14, 116, 144, 0.1), transparent 50%),
          radial-gradient(ellipse 70% 50% at 50% 100%, rgba(99, 102, 241, 0.08), transparent 55%);
        pointer-events: none;
        z-index: 0;
      }

      @media (prefers-reduced-motion: no-preference) {
        .preview-area::before {
          animation: showcase-float 18s ease-in-out infinite;
        }
      }

      .preview-area::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(15, 23, 42, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(15, 23, 42, 0.04) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(ellipse 75% 70% at 50% 45%, #000 20%, transparent 75%);
        pointer-events: none;
        z-index: 0;
        opacity: 0.5;
      }

      .preview-column {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        padding: 12px 8px 14px;
        gap: 10px;
        border-right: 1px solid var(--border);
        min-height: 0;
        height: 100%;
        align-self: stretch;
      }
      .preview-column:last-child {
        border-right: none;
      }

      .preview-hero {
        flex-shrink: 0;
        text-align: center;
        max-width: 420px;
        margin: 0 auto;
        padding: 2px 4px 0;
      }

      .preview-eyebrow {
        display: inline-block;
        margin: 0 0 8px;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent-2);
        opacity: 0.95;
      }

      .preview-label {
        text-align: center;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        color: var(--muted);
      }

      .preview-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 10px;
        align-self: center;
      }

      .btn-reload {
        font: inherit;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 18px;
        border-radius: 12px;
        border: 1px solid transparent;
        color: var(--text);
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        cursor: pointer;
        min-height: 44px;
        transition:
          background 0.2s ease,
          background-position 0.45s ease,
          border-color 0.2s ease,
          color 0.2s ease,
          transform 0.2s cubic-bezier(0.34, 1.3, 0.64, 1),
          box-shadow 0.2s ease;
      }

      .btn-reload:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.28);
      }

      .btn-reload-action {
        gap: 8px;
        background: linear-gradient(120deg, #6366f1 0%, #7c3aed 40%, #0e7490 85%, #22d3ee 100%);
        background-size: 200% auto;
        background-position: 0% 50%;
        box-shadow:
          0 4px 20px rgba(99, 102, 241, 0.45),
          0 0 0 1px rgba(255, 255, 255, 0.12) inset;
      }

      .btn-reload-action .btn-reload-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: rgba(255, 255, 255, 0.9);
      }

      .btn-reload-action:hover:not(:disabled) {
        background-position: 100% 50%;
        transform: translateY(-2px);
        box-shadow:
          0 12px 32px rgba(99, 102, 241, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.18) inset;
      }

      .btn-reload-action:active:not(:disabled) {
        transform: translateY(0);
      }

      .btn-reload-icon-svg {
        display: block;
        width: 17px;
        height: 17px;
      }

      .btn-reload:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .btn-reload:disabled:hover {
        transform: none;
      }

      .btn-copy {
        gap: 8px;
        border: 1px solid var(--border-strong);
        background: rgba(255, 255, 255, 0.72);
        color: var(--text);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }

      .btn-copy .btn-copy-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: var(--accent-2);
      }

      .btn-copy:hover:not(:disabled) {
        border-color: rgba(14, 116, 144, 0.35);
        background: rgba(224, 242, 254, 0.65);
        color: var(--text);
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.1);
      }

      .btn-copy:hover:not(:disabled) .btn-copy-icon {
        color: #0e7490;
      }

      .btn-copy:active:not(:disabled) {
        transform: translateY(0);
      }

      .btn-copy-icon-svg {
        display: block;
        width: 17px;
        height: 17px;
      }

      .device-wrap {
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 8px 6px;
        border-radius: 22px;
        overflow: hidden;
        /* Для cqw/cqh у .phone-device-shadow: вписать телефон в доступную область без ломки aspect */
        container-type: size;
        container-name: device-stage;
        border: 1px solid var(--device-stage-edge);
        background:
          radial-gradient(
            ellipse 90% 75% at 50% 44%,
            var(--device-stage-glow) 0%,
            transparent 58%
          ),
          radial-gradient(
            ellipse 130% 85% at 50% -5%,
            var(--device-stage-glow-soft) 0%,
            transparent 50%
          ),
          linear-gradient(168deg, #fbfcfe 0%, #f4f7fb 42%, #e9eef8 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.95),
          inset 0 0 0 1px rgba(15, 23, 42, 0.06),
          inset 0 -10px 28px rgba(15, 23, 42, 0.03),
          0 4px 22px rgba(15, 23, 42, 0.06);
      }

      /* Тень снаружи: clip-path на .phone-device обрезал бы box-shadow */
      .phone-device-shadow {
        position: relative;
        flex: 0 0 auto;
        align-self: center;
        /*
         * Если задать фиксированную ширину и max-height: 100%, часть движков даёт
         * «перекошенный» блок (например 320×631) — хром object-fit:contain уже,
         * а iframe на всю ширину, игра вылезает за отрисованный корпус.
         * Ширина = min(желаемая, по ширине сцены, по высоте сцены с сохранением 72.5:150).
         */
        width: min(var(--phone-short-edge), 100%);
        max-width: 100%;
        aspect-ratio: var(--phone-aspect-w) / var(--phone-aspect-h);
        height: auto;
        max-height: 100%;
        min-height: 0;
        box-sizing: border-box;
        filter: drop-shadow(0 14px 28px rgba(15, 23, 42, 0.14))
          drop-shadow(0 2px 6px rgba(15, 23, 42, 0.08));
      }

      @supports (width: min(1cqw, 100%)) {
        .phone-device-shadow {
          width: min(
            var(--phone-short-edge),
            100cqw,
            calc(
              max(0px, 100cqh - var(--phone-shadow-vpad)) * var(--phone-aspect-w) /
                var(--phone-aspect-h)
            )
          );
          max-height: max(0px, calc(100cqh - var(--phone-shadow-vpad)));
        }
      }

      /* Телефон: боковые кнопки (IPhone-17-buttons) под iframe, корпус (IPhone-17-frame) над */
      .phone-device {
        position: absolute;
        inset: 0;
        box-sizing: border-box;
        isolation: isolate;
        overflow: hidden;
        contain: paint;
        -webkit-clip-path: url(#showcase-phone-hull-clip);
        clip-path: url(#showcase-phone-hull-clip);
      }

      .phone-screen {
        position: absolute;
        z-index: 1;
        inset: 0;
        overflow: hidden;
        background: #0a0a0c;
        pointer-events: none;
        contain: paint;
        -webkit-clip-path: url(#showcase-phone-screen-clip);
        clip-path: url(#showcase-phone-screen-clip);
      }

      .phone-screen iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #111;
        pointer-events: auto;
      }

      .phone-chrome {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        box-sizing: border-box;
        pointer-events: none;
        user-select: none;
      }

      img.phone-chrome {
        object-fit: contain;
        object-position: center;
      }

      .phone-chrome--buttons {
        z-index: 0;
      }

      .phone-chrome--frame {
        z-index: 2;
      }

      @media (prefers-reduced-motion: reduce) {
        .theme-item:hover,
        .theme-item.active {
          transform: none;
        }

        .preview-area::before {
          animation: none;
        }

        .btn-reload:hover:not(:disabled),
        .btn-reload:active:not(:disabled),
        .btn-copy:hover:not(:disabled),
        .btn-copy:active:not(:disabled) {
          transform: none;
        }

        .bottom-section-cta-link:hover {
          transform: none;
        }
      }

      /*
       * Узкий экран / портрет устройства: этот блок в конце, чтобы перекрыть
       * .preview-column { height: 100% } и flex-цепочку .device-wrap (иначе высота iframe → 0).
       */
      @media (max-width: 700px) {
        :root {
          --phone-short-edge: min(322px, 94vw);
          /* На узкой вёрстке тень сильнее упирается в overflow — чуть больший запас */
          --phone-shadow-vpad: 60px;
        }

        .layout {
          flex-direction: column;
          align-items: stretch;
          min-height: 100%;
          height: auto;
        }

        .sidebar {
          width: 100%;
          min-width: 0;
          flex: 0 0 auto;
          height: auto;
          max-height: none;
          position: relative;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }

        .theme-list {
          flex: 0 1 auto;
          max-height: min(38vh, 240px);
        }

          display: flex;
          flex-direction: column;
          flex: 0 0 auto;
          width: 100%;
          min-width: 0;
          height: auto;
          min-height: 0;
        }

        .bottom-section {
          padding: 18px 16px 20px;
          border-left: none;
          border-top: 1px solid var(--border);
          justify-content: flex-start;
          overflow-y: visible;
        }

        .bottom-section-inner {
          flex-direction: column;
          align-items: stretch;
          max-width: 900px;
          margin: 0 auto;
          width: 100%;
        }

        .bottom-section-title {

          letter-spacing: 0.18em;
          text-align: center;

        .bottom-section-networks {
          justify-content: center;
        }

        .bottom-section-cta {
          align-items: center;
        }

        .bottom-section-cta-link {
          text-align: center;
          width: auto;
          align-self: center;
        }

        .preview-column {
          flex: 0 0 auto;
          height: auto;
          min-height: 0;
          align-self: stretch;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }

        .preview-column:last-child {
          border-bottom: none;
        }

        .preview-hero {
          padding: 0 4px;
        }

        .device-wrap {
          flex: 0 0 auto;
          /* Явная высота сцены: иначе цепочка height:auto + absolute-ребёнок даёт 0 */
          min-height: min(72vh, 640px);
          align-items: center;
          justify-content: center;
          margin: 4px 6px;
          padding: 14px 8px;
          border-radius: 20px;
          overflow: visible;
        }

        /*
         * Внутри .phone-device — position:absolute → у .phone-device-shadow обязательны
         * конкретные width и height (не height:auto без ширины).
         * --w = min(желаемая короткая сторона, сцена по ширине, лимит по высоте viewport).
         */
        .phone-device-shadow.phone-portrait {
          --phone-stage-w: 100%;
          --phone-cap-h: max(
            120px,
            calc(min(72vh, 640px) - var(--phone-shadow-vpad))
          );
          --phone-w: min(
            var(--phone-short-edge),
            var(--phone-stage-w),
            calc(var(--phone-cap-h) * var(--phone-aspect-w) / var(--phone-aspect-h))
          );
          width: var(--phone-w);
          height: calc(
            var(--phone-w) * var(--phone-aspect-h) / var(--phone-aspect-w)
          );
          max-width: 100%;
          max-height: none;
          aspect-ratio: unset;
          box-sizing: border-box;
        }

        @supports (width: min(1cqw, 100%)) {
          .phone-device-shadow.phone-portrait {
            --phone-stage-w: 100cqw;
          }
        }

      }

    <script>
      (function () {
        function formatBundleBytes(n) {
          if (typeof n !== 'number' || !isFinite(n) || n < 0) {
            return '';
          }
          if (n < 1024) {
            return n + ' B';
          }
          if (n < 1048576) {
            return (n / 1024).toFixed(n < 10240 ? 1 : 0) + ' KB';
          }
          return (n / 1048576).toFixed(n < 10485760 ? 1 : 0) + ' MB';
        }

        let SHOWCASE = {
          gameTitle: 'Black Hole',
          variantCount: 3,
          tagline: 'themed playable builds — drag to swallow the board',
          themes: [
            {
              id: 'default',
              head: '\u2699\uFE0F Default',
              meta:
                'Base theme \u00B7 Classic palette \u00B7 Theme music',
              /** После новой выкладки: HEAD по `url` и при желании bundleBytes для строки размера в списке. */
              url: 'https://files.alconost.com/IaRy1OOCRzZz75Qb8kyCi',
            },
            {
              id: 'space',
              head: '\uD83D\uDE80 Space',
              meta:
                'Cosmic props \u00B7 Starfield \u00B7 Theme music',
              url: 'https://files.alconost.com/1O0aM0OURGN3cM1J3_akq',
            },
            {
              id: 'city',
              head: '\uD83C\uDFD9\uFE0F City',
              meta:
                'Urban skyline \u00B7 Pizza \u00B7 coffee \u00B7 cones',
              url: 'https://files.alconost.com/Hfp26Uh4hYgXhoxJwauEr',
            },
          ],
        };

        let listEl = document.getElementById('theme-list');
        let iframePortrait = document.getElementById('iframe-portrait');
        let btnCopyBuild = document.getElementById('btn-copy-build-link');
        let copyLabelEl = btnCopyBuild.querySelector('.btn-copy-label');
        let activeEl = null;
        let activeBuildUrl = '';

        document.getElementById('game-title').textContent = SHOWCASE.gameTitle;
        document.getElementById('variant-count').textContent = String(SHOWCASE.variantCount);
        document.getElementById('game-tagline').textContent = SHOWCASE.tagline;

        function updateCopyButtonState() {
          let usable = activeBuildUrl && activeBuildUrl !== '#';
          btnCopyBuild.disabled = !usable;
        }

        function selectTheme(row, url) {
          if (activeEl) activeEl.classList.remove('active');
          row.classList.add('active');
          activeEl = row;
          activeBuildUrl = url;
          iframePortrait.src = url;
          updateCopyButtonState();
        }

        SHOWCASE.themes.forEach(function (t, i) {
          let row = document.createElement('div');
          row.className = 'theme-item' + (i === 0 ? ' active' : '');
          row.setAttribute('role', 'listitem');
          row.setAttribute('tabindex', '0');

          let head = document.createElement('span');
          head.className = 'head line';
          head.textContent = t.head;

          let meta = document.createElement('span');
          meta.className = 'meta line';
          let sizePart = formatBundleBytes(t.bundleBytes);
          meta.textContent = sizePart ? t.meta + ' ' + sizePart : t.meta;

          row.appendChild(head);
          row.appendChild(meta);

          function activate() {
            selectTheme(row, t.url);
          }

          row.addEventListener('click', activate);
          row.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              activate();
            }
          });

          listEl.appendChild(row);

          if (i === 0) {
            selectTheme(row, t.url);
          }
        });

        document.getElementById('btn-reload-portrait').addEventListener('click', function () {
          iframePortrait.src = iframePortrait.src;
        });

        btnCopyBuild.addEventListener('click', function () {
          if (!activeBuildUrl || activeBuildUrl === '#') return;
          function flashCopied() {
            let prev = copyLabelEl.textContent;
            copyLabelEl.textContent = 'Copied!';
            setTimeout(function () {
              copyLabelEl.textContent = prev;
            }, 1600);
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(activeBuildUrl).then(flashCopied).catch(function () {
              fallbackCopy();
            });
          } else {
            fallbackCopy();
          }
          function fallbackCopy() {
            let ta = document.createElement('textarea');
            ta.value = activeBuildUrl;
            ta.setAttribute('readonly', '');
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try {
              document.execCommand('copy');
              flashCopied();
            } finally {
              document.body.removeChild(ta);
            }
          }
        });
      })();
    </script>
  </body>
