<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Hole — Playable ads showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #e8edf6;
        --bg-elevated: #ffffff;
        --sidebar-bg: rgba(255, 255, 255, 0.94);
        --border: rgba(15, 23, 42, 0.09);
        --border-strong: rgba(15, 23, 42, 0.16);
        --text: #0f172a;
        --muted: #64748b;
        --accent: #4f46e5;
        --accent-2: #0e7490;
        --accent-glow: rgba(79, 70, 229, 0.28);
        --item-active: rgba(79, 70, 229, 0.12);
        --sidebar-width: 288px;
        /* Макс. ширина превью портрета (~узкая сторона 9∶16) */
        --phone-short-edge: min(352px, 52vw);
        /* Макс. ширина превью альбома 16∶9 */
        --phone-long-edge: min(520px, 78vw);
        /* Подложка под макет телефона */
        --device-stage-edge: rgba(15, 23, 42, 0.1);
        --device-stage-glow: rgba(79, 70, 229, 0.16);
        --device-stage-glow-soft: rgba(14, 116, 144, 0.12);
        --network-chip-bg: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.98) 0%,
          rgba(241, 245, 249, 0.94) 100%
        );
        --network-chip-border: rgba(15, 23, 42, 0.1);
        --network-chip-text: rgba(30, 41, 59, 0.92);
      }

      * {
        box-sizing: border-box;
      }

      @keyframes showcase-float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(2%, -1.5%) scale(1.02);
        }
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family:
          'Outfit',
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      .layout {
        display: flex;
        align-items: stretch;
        min-height: 100vh;
        height: 100%;
      }

      .sidebar {
        width: var(--sidebar-width);
        min-width: var(--sidebar-width);
        height: 100vh;
        position: sticky;
        top: 0;
        display: flex;
        flex-direction: column;
        background: var(--sidebar-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-right: 1px solid var(--border);
        overflow: hidden;
        box-shadow: 8px 0 36px rgba(15, 23, 42, 0.07);
      }

      .sidebar-header {
        flex-shrink: 0;
        padding: 22px 18px 18px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(
          165deg,
          rgba(79, 70, 229, 0.06) 0%,
          transparent 55%
        );
      }

      .showcase-eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin: 0 0 12px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent-2);
        background: rgba(14, 116, 144, 0.1);
        border: 1px solid rgba(14, 116, 144, 0.22);
      }

      .showcase-eyebrow::before {
        content: '';
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent-2);
        box-shadow: 0 0 10px rgba(14, 116, 144, 0.45);
      }

      .sidebar-header h1 {
        margin: 0 0 12px;
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1.15;
        background: linear-gradient(105deg, #0f172a 0%, #334155 42%, #0369a1 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .sidebar-header .game-name {
        display: inline;
      }

      .variant-count-container {
        margin: 0;
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 6px 10px;
      }

      .variant-count {
        font-weight: 800;
        font-size: 1.5rem;
        line-height: 1;
        letter-spacing: -0.03em;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .sidebar-header .tagline {
        margin: 0;
        flex: 1 1 140px;
        min-width: 0;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--muted);
        line-height: 1.45;
      }

      .theme-list {
        flex: 1;
        overflow-y: auto;
        padding: 14px 12px 20px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: thin;
        scrollbar-color: rgba(79, 70, 229, 0.35) transparent;
      }

      .theme-list::-webkit-scrollbar {
        width: 6px;
      }

      .theme-list::-webkit-scrollbar-thumb {
        background: rgba(79, 70, 229, 0.35);
        border-radius: 999px;
      }

      .theme-item {
        position: relative;
        margin-bottom: 8px;
        padding: 14px 14px 14px 16px;
        font-size: 0.82rem;
        cursor: pointer;
        color: var(--muted);
        border-radius: 14px;
        border: 1px solid transparent;
        background: rgba(15, 23, 42, 0.035);
        transition:
          background 0.22s ease,
          border-color 0.22s ease,
          color 0.22s ease,
          transform 0.22s ease,
          box-shadow 0.22s ease;
      }

      .theme-item::before {
        content: '';
        position: absolute;
        left: 0;
        top: 10px;
        bottom: 10px;
        width: 3px;
        border-radius: 0 4px 4px 0;
        background: linear-gradient(180deg, var(--accent), var(--accent-2));
        opacity: 0;
        transform: scaleY(0.6);
        transition:
          opacity 0.22s ease,
          transform 0.22s ease;
      }

      .theme-item:hover {
        background: rgba(255, 255, 255, 0.82);
        border-color: var(--border);
        color: var(--text);
        transform: translateX(4px);
        box-shadow:
          0 10px 28px rgba(15, 23, 42, 0.08),
          0 0 0 1px rgba(255, 255, 255, 0.9) inset;
      }

      .theme-item:hover::before {
        opacity: 0.55;
        transform: scaleY(1);
      }

      .theme-item:focus-visible {
        outline: none;
        border-color: rgba(79, 70, 229, 0.45);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.22);
      }

      .theme-item.active {
        background: linear-gradient(
          135deg,
          rgba(79, 70, 229, 0.12) 0%,
          rgba(14, 116, 144, 0.06) 100%
        );
        border-color: rgba(79, 70, 229, 0.28);
        color: var(--text);
        box-shadow:
          0 14px 36px rgba(15, 23, 42, 0.08),
          0 0 20px var(--accent-glow),
          0 0 0 1px rgba(255, 255, 255, 0.85) inset;
        transform: translateX(4px);
      }

      .theme-item.active::before {
        opacity: 1;
        transform: scaleY(1);
      }

      .theme-item .line {
        display: block;
      }

      .theme-item .head {
        font-weight: 700;
        color: var(--text);
        margin-bottom: 6px;
        font-size: 0.9rem;
        letter-spacing: -0.01em;
      }

      .theme-item.active .head {
        color: var(--text);
      }

      .theme-item .meta {
        font-size: 0.74rem;
        line-height: 1.4;
        opacity: 0.92;
      }

      .preview-area {
        flex: 1;
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        height: 100vh;
        position: relative;
        background: var(--bg);
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .bottom-section {
        position: relative;
        z-index: 1;
        flex-shrink: 0;
        min-width: 0;
        min-height: 0;
        margin: 0;
        padding: 18px 16px 20px;
        border-top: none;
        border-left: 1px solid var(--border);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.72) 0%,
          rgba(248, 250, 252, 0.96) 100%
        );
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .bottom-section-inner {
        max-width: none;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: center;
        gap: 20px;
      }

      .bottom-section-main {
        flex: 0 1 auto;
        min-width: 0;
        width: 100%;
        text-align: center;
      }

      .bottom-section-title {
        margin: 0 0 10px;
        font-size: 0.62rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent-2);
        line-height: 1.4;
        text-align: center;
      }

      .bottom-section-networks {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        gap: 8px 8px;
        justify-content: center;
      }

      .bottom-section-networks li {
        margin: 0;
        padding: 6px 14px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: clamp(11px, 1.1vw, 14px);
        font-weight: 600;
        color: var(--network-chip-text);
        background: var(--network-chip-bg);
        border: 1px solid var(--network-chip-border);
        border-radius: 999px;
        letter-spacing: 0.02em;
        white-space: nowrap;
        box-shadow:
          0 4px 14px rgba(15, 23, 42, 0.06),
          0 0 0 1px rgba(79, 70, 229, 0.06) inset;
      }

      /* Как на https://files.alconost.com/rVUdrfuYUzclWyCA1wLSd — .badge svg, .badge img */
      .bottom-section-networks li svg,
      .bottom-section-networks li img {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        display: block;
        object-fit: contain;
      }

      .bottom-section-cta {
        flex: 0 1 auto;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        width: 100%;
      }

      .bottom-section-cta-lead {
        margin: 28px 0 0;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--text);
        text-align: center;
      }

      .bottom-section-cta-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        box-sizing: border-box;
        padding: 10px 18px;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        text-decoration: none;
        color: #0a0b10;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 28px var(--accent-glow);
        transition:
          transform 0.15s ease,
          filter 0.15s ease;
      }

      .bottom-section-cta-link:hover {
        filter: brightness(1.06);
        transform: translateY(-1px);
      }

      .bottom-section-cta-link:focus-visible {
        outline: 2px solid var(--accent-2);
        outline-offset: 3px;
      }

      .preview-area::before {
        content: '';
        position: absolute;
        /* inset: -20%; */
        background:
          radial-gradient(ellipse 55% 45% at 18% 22%, rgba(79, 70, 229, 0.14), transparent 55%),
          radial-gradient(ellipse 50% 40% at 88% 78%, rgba(14, 116, 144, 0.1), transparent 50%),
          radial-gradient(ellipse 70% 50% at 50% 100%, rgba(99, 102, 241, 0.08), transparent 55%);
        pointer-events: none;
        z-index: 0;
      }

      @media (prefers-reduced-motion: no-preference) {
        .preview-area::before {
          animation: showcase-float 18s ease-in-out infinite;
        }
      }

      .preview-area::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(15, 23, 42, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(15, 23, 42, 0.04) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(ellipse 75% 70% at 50% 45%, #000 20%, transparent 75%);
        pointer-events: none;
        z-index: 0;
        opacity: 0.5;
      }

      .preview-column {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        flex: 0 1 auto;
        width: 100%;
        min-height: 100%;
        padding: 12px 8px 14px;
        gap: 10px;
        border-right: none;
        align-self: stretch;
        box-sizing: border-box;
      }
      .preview-column:last-child {
        border-right: none;
      }

      .preview-label {
        text-align: center;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        color: var(--muted);
      }

      .preview-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 10px;
        align-self: center;
        flex-shrink: 0;
        margin-top: 16px;
      }

      .btn-reload {
        font: inherit;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 18px;
        border-radius: 12px;
        border: 1px solid transparent;
        color: var(--text);
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        cursor: pointer;
        min-height: 44px;
        transition:
          background 0.2s ease,
          border-color 0.2s ease,
          color 0.2s ease,
          transform 0.2s cubic-bezier(0.34, 1.3, 0.64, 1),
          box-shadow 0.2s ease;
      }

      .btn-reload:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.28);
      }

      .btn-reload:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .btn-reload:disabled:hover {
        transform: none;
      }

      .btn-copy {
        gap: 8px;
        border: 1px solid var(--border-strong);
        background: rgba(255, 255, 255, 0.72);
        color: var(--text);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }

      .btn-copy .btn-copy-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: var(--accent-2);
      }

      .btn-copy:hover:not(:disabled) {
        border-color: rgba(14, 116, 144, 0.35);
        background: rgba(224, 242, 254, 0.65);
        color: var(--text);
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.1);
      }

      .btn-copy:hover:not(:disabled) .btn-copy-icon {
        color: #0e7490;
      }

      .btn-copy:active:not(:disabled) {
        transform: translateY(0);
      }

      .btn-copy-icon-svg {
        display: block;
        width: 17px;
        height: 17px;
      }

      .device-pair {
        flex: 0 1 auto;
        min-height: auto;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: clamp(16px, 3.5vw, 32px);
        width: 100%;
        box-sizing: border-box;
        margin: 0;
        padding: 18px 16px;
        border-radius: 22px;
        overflow: visible;
        /* container-type: size; */
        container-name: device-stage;
        border: 1px solid var(--device-stage-edge);
        background:
          radial-gradient(
            ellipse 90% 75% at 50% 44%,
            var(--device-stage-glow) 0%,
            transparent 58%
          ),
          radial-gradient(
            ellipse 130% 85% at 50% -5%,
            var(--device-stage-glow-soft) 0%,
            transparent 50%
          ),
          linear-gradient(168deg, #fbfcfe 0%, #f4f7fb 42%, #e9eef8 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.95),
          inset 0 0 0 1px rgba(15, 23, 42, 0.06),
          inset 0 -10px 28px rgba(15, 23, 42, 0.03),
          0 4px 22px rgba(15, 23, 42, 0.06);
      }

      .device-pair-unit {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        flex: 0 1 auto;
        min-width: 0;
      }

      .device-pair-unit .preview-label {
        margin: 0;
      }

      /*
       * Две простые рамки: iframe с реальными пропорциями (Pixi resizeTo → #game-container).
       */
      .preview-frame {
        flex: 0 0 auto;
        align-self: center;
        box-sizing: border-box;
        height: auto;
        overflow: hidden;
        border-radius: 32px;
        border: 10px solid #4f4f5a;
        background: #ffffff;
        filter: drop-shadow(0 14px 28px rgba(15, 23, 42, 0.16))
          drop-shadow(0 2px 8px rgba(15, 23, 42, 0.1));
        box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.07);
      }

      .preview-frame iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #111;
      }

      .preview-frame--portrait {
        width: min(var(--phone-short-edge), 100%);
        max-width: min(380px, 100%);
        aspect-ratio: 9 / 16;
      }

      .preview-frame--landscape {
        width: min(var(--phone-long-edge), 100%);
        max-width: min(640px, 100%);
        aspect-ratio: 16 / 9;
      }

      @supports (width: min(1cqw, 100%)) {
        .preview-frame--portrait {
          width: min(var(--phone-short-edge), min(360px, 94cqw));
        }

        .preview-frame--landscape {
          width: min(var(--phone-long-edge), min(620px, 94cqw));
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .theme-item:hover,
        .theme-item.active {
          transform: none;
        }

        .preview-area::before {
          animation: none;
        }

        .btn-reload:hover:not(:disabled),
        .btn-reload:active:not(:disabled),
        .btn-copy:hover:not(:disabled),
        .btn-copy:active:not(:disabled) {
          transform: none;
        }

        .bottom-section-cta-link:hover {
          transform: none;
        }
      }

      /*
       * Узкий экран: этот блок в конце, чтобы перекрыть flex-цепочку без обрезки контента при скролле.
       */
      @media (max-width: 700px) {
        :root {
          --phone-short-edge: min(322px, 94vw);
          --phone-long-edge: min(560px, 96vw);
        }

        .layout {
          flex-direction: column;
          align-items: stretch;
          min-height: 100%;
          height: auto;
        }

        .sidebar {
          width: 100%;
          min-width: 0;
          flex: 0 0 auto;
          height: auto;
          max-height: none;
          position: relative;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }

        .theme-list {
          flex: 0 1 auto;
          max-height: min(38vh, 240px);
        }

        .preview-area {
          display: flex;
          flex-direction: column;
          flex: 0 0 auto;
          width: 100%;
          min-width: 0;
          height: auto;
          min-height: 0;
          overflow: visible;
        }

        .bottom-section {
          padding: 18px 16px 20px;
          border-left: none;
          border-top: 1px solid var(--border);
          justify-content: flex-start;
          overflow-y: visible;
        }

        .bottom-section-inner {
          flex-direction: column;
          align-items: stretch;
          max-width: 900px;
          margin: 0 auto;
          width: 100%;
        }

        .bottom-section-title {
          font-size: 0.68rem;
          letter-spacing: 0.18em;
          text-align: center;
        }

        .bottom-section-networks {
          justify-content: center;
        }

        .bottom-section-cta {
          align-items: center;
        }

        .bottom-section-cta-link {
          text-align: center;
          width: auto;
          align-self: center;
        }

        .preview-column {
          flex: 0 0 auto;
          height: auto;
          min-height: 0;
          align-self: stretch;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }

        .preview-column:last-child {
          border-bottom: none;
        }

        .device-pair {
          flex-direction: column;
          gap: 20px;
          padding: 14px 8px;
          border-radius: 20px;
        }

        .preview-frame {
          max-width: 100%;
        }

        .preview-frame--portrait,
        .preview-frame--landscape {
          width: min(100%, 100vw - 32px);
        }
        .preview-frame--portrait {
          max-width: 400px;
        }

        @supports (width: min(1cqw, 100%)) {
          .preview-frame--portrait,
          .preview-frame--landscape {
            width: min(100vw, 90vw);
          }
        }

      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar" aria-label="Themes">
        <div class="sidebar-header">
          <p class="showcase-eyebrow">Playable ads</p>
          <h1>
            <span class="game-name" id="game-title">Black Hole</span>
          </h1>
          <p class="variant-count-container">
            <span class="variant-count" id="variant-count">3</span>
            <span class="tagline" id="game-tagline">
              themed playable builds — drag to swallow the board
            </span>
          </p>
        </div>
        <div class="theme-list" id="theme-list" role="list"></div>
      </aside>

      <div class="preview-area">
        <div class="preview-column" aria-label="Device preview">
          <div class="device-pair" role="group" aria-label="Portrait and landscape playable previews">
              <div class="device-pair-unit">
                <p class="preview-label">Portrait</p>
                <div class="preview-frame preview-frame--portrait">
                  <iframe
                    id="iframe-portrait"
                    width="390"
                    height="844"
                    title="Playable portrait"
                    allow="autoplay; fullscreen"

    <script>
      (function () {
        function formatBundleBytes(n) {
          if (typeof n !== 'number' || !isFinite(n) || n < 0) {
            return '';
          }
          if (n < 1024) {
            return n + ' B';
          }
          if (n < 1048576) {
            return (n / 1024).toFixed(n < 10240 ? 1 : 0) + ' KB';
          }
          return (n / 1048576).toFixed(n < 10485760 ? 1 : 0) + ' MB';
        }

        let SHOWCASE = {
          gameTitle: 'Black Hole',
          variantCount: 3,
          tagline: 'themed playable builds — drag to swallow the board',
          themes: [
            {
              id: 'default',
              head: '\u2699\uFE0F Default',
              meta:
                'Base theme \u00B7 Classic palette \u00B7 Theme music',
              /** После новой выкладки: HEAD по `url` и при желании bundleBytes для строки размера в списке. */
              url: 'https://files.alconost.com/IaRy1OOCRzZz75Qb8kyCi',
            },
            {
              id: 'space',
              head: '\uD83D\uDE80 Space',
              meta:
                'Cosmic props \u00B7 Starfield \u00B7 Theme music',
              url: 'https://files.alconost.com/1O0aM0OURGN3cM1J3_akq',
            },
            {
              id: 'city',
              head: '\uD83C\uDFD9\uFE0F City',
              meta:
                'Urban skyline \u00B7 Pizza \u00B7 coffee \u00B7 cones',
              url: 'https://files.alconost.com/Hfp26Uh4hYgXhoxJwauEr',
            },
          ],
        };

        let listEl = document.getElementById('theme-list');
        let iframePortrait = document.getElementById('iframe-portrait');
        let iframeLandscape = document.getElementById('iframe-landscape');
        let btnCopyBuild = document.getElementById('btn-copy-build-link');
        let copyLabelEl = btnCopyBuild.querySelector('.btn-copy-label');
        let activeEl = null;
        let activeBuildUrl = '';

        document.getElementById('game-title').textContent = SHOWCASE.gameTitle;
        document.getElementById('variant-count').textContent = String(SHOWCASE.variantCount);
        document.getElementById('game-tagline').textContent = SHOWCASE.tagline;

        function updateCopyButtonState() {
          let usable = activeBuildUrl && activeBuildUrl !== '#';
          btnCopyBuild.disabled = !usable;
        }

        function selectTheme(row, url) {
          if (activeEl) activeEl.classList.remove('active');
          row.classList.add('active');
          activeEl = row;
          activeBuildUrl = url;
          iframePortrait.src = url;
          iframeLandscape.src = url;
          updateCopyButtonState();
        }

        SHOWCASE.themes.forEach(function (t, i) {
          let row = document.createElement('div');
          row.className = 'theme-item' + (i === 0 ? ' active' : '');
          row.setAttribute('role', 'listitem');
          row.setAttribute('tabindex', '0');

          let head = document.createElement('span');
          head.className = 'head line';
          head.textContent = t.head;

          let meta = document.createElement('span');
          meta.className = 'meta line';
          let sizePart = formatBundleBytes(t.bundleBytes);
          meta.textContent = sizePart ? t.meta + ' ' + sizePart : t.meta;

          row.appendChild(head);
          row.appendChild(meta);

          function activate() {
            selectTheme(row, t.url);
          }

          row.addEventListener('click', activate);
          row.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              activate();
            }
          });

          listEl.appendChild(row);

          if (i === 0) {
            selectTheme(row, t.url);
          }
        });

        btnCopyBuild.addEventListener('click', function () {
          if (!activeBuildUrl || activeBuildUrl === '#') return;
          function flashCopied() {
            let prev = copyLabelEl.textContent;
            copyLabelEl.textContent = 'Copied!';
            setTimeout(function () {
              copyLabelEl.textContent = prev;
            }, 1600);
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(activeBuildUrl).then(flashCopied).catch(function () {
              fallbackCopy();
            });
          } else {
            fallbackCopy();
          }
          function fallbackCopy() {
            let ta = document.createElement('textarea');
            ta.value = activeBuildUrl;
            ta.setAttribute('readonly', '');
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try {
              document.execCommand('copy');
              flashCopied();
            } finally {
              document.body.removeChild(ta);
            }
          }
        });
      })();
    </script>
