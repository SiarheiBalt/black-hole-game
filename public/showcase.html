<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playable Ad Roster — showcase</title>
    <link rel="dns-prefetch" href="https://files.alconost.com" />
    <link rel="preconnect" href="https://files.alconost.com" crossorigin />
    <!--
      Start the default theme's playable download as soon as parsing reaches <head>, before any
      JS runs. mountTheme() later assigns this URL to the portrait iframe and the bytes are
      already arriving (or fully cached).
    -->
    <link
      rel="preload"
      as="document"
      href="https://files.alconost.com/IaRy1OOCRzZz75Qb8kyCi"
      crossorigin
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"
      defer
    ></script>
    <style>
      :root {
        --bg: #e8edf6;
        --bg-elevated: #ffffff;
        --sidebar-bg: rgba(255, 255, 255, 0.94);
        --border: rgba(15, 23, 42, 0.09);
        --border-strong: rgba(15, 23, 42, 0.16);
        --text: #0f172a;
        --muted: #64748b;
        --accent: #4f46e5;
        --accent-2: #0e7490;
        --accent-glow: rgba(79, 70, 229, 0.28);
        --item-active: rgba(79, 70, 229, 0.12);
        --sidebar-width: 288px;
        /* Макс. ширина превью портрета (~узкая сторона 9∶16) */
        --phone-short-edge: min(352px, 52vw);
        /* Макс. ширина превью альбома 16∶9 */
        --phone-long-edge: min(520px, 78vw);
        /* Подложка под макет телефона */
        --device-stage-edge: rgba(15, 23, 42, 0.1);
        --device-stage-glow: rgba(79, 70, 229, 0.16);
        --device-stage-glow-soft: rgba(14, 116, 144, 0.12);
        --network-chip-bg: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.98) 0%,
          rgba(241, 245, 249, 0.94) 100%
        );
        --network-chip-border: rgba(15, 23, 42, 0.1);
        --network-chip-text: rgba(30, 41, 59, 0.92);
      }

      * {
        box-sizing: border-box;
      }

      @keyframes showcase-float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(2%, -1.5%) scale(1.02);
        }
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family:
          'Outfit',
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      .layout {
        display: flex;
        align-items: stretch;
        min-height: 100vh;
        height: 100%;
      }

      .sidebar {
        width: var(--sidebar-width);
        min-width: var(--sidebar-width);
        height: 100vh;
        position: sticky;
        top: 0;
        display: flex;
        flex-direction: column;
        background: var(--sidebar-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-right: 1px solid var(--border);
        overflow: hidden;
        box-shadow: 8px 0 36px rgba(15, 23, 42, 0.07);
      }

      .sidebar-header {
        flex-shrink: 0;
        padding: 22px 18px 18px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(
          165deg,
          rgba(79, 70, 229, 0.06) 0%,
          transparent 55%
        );
      }

      .brand-lockup {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 10px;
      }

      .brand-logo {
        display: block;
        height: 44px;
        width: auto;
        max-width: min(220px, 100%);
        object-fit: contain;
        object-position: left center;
      }

      .showcase-eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin: 0 0 12px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent-2);
        background: rgba(14, 116, 144, 0.1);
        border: 1px solid rgba(14, 116, 144, 0.22);
      }

      .showcase-eyebrow::before {
        content: '';
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent-2);
        box-shadow: 0 0 10px rgba(14, 116, 144, 0.45);
      }

      .sidebar-header h1 {
        margin: 0 0 12px;
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1.15;
        background: linear-gradient(105deg, #0f172a 0%, #334155 42%, #0369a1 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .sidebar-header .game-name {
        display: inline;
      }

      .theme-list {
        flex: 1;
        overflow-y: auto;
        padding: 14px 12px 20px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: thin;
        scrollbar-color: rgba(79, 70, 229, 0.35) transparent;
      }

      .theme-list::-webkit-scrollbar {
        width: 6px;
      }

      .theme-list::-webkit-scrollbar-thumb {
        background: rgba(79, 70, 229, 0.35);
        border-radius: 999px;
      }

      .sidebar-footer {
        flex-shrink: 0;
        padding: 12px 18px 16px;
        border-top: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.6);
      }

      .sidebar-footer-text {
        margin: 0;
        font-size: 0.72rem;
        font-weight: 500;
        letter-spacing: 0.02em;
        line-height: 1.4;
        color: var(--muted);
        text-align: left;
      }

      .sidebar-footer-text a {
        color: var(--accent-2);
        text-decoration: none;
        font-weight: 600;
      }

      .sidebar-footer-text a:hover,
      .sidebar-footer-text a:focus-visible {
        text-decoration: underline;
      }

      .theme-item {
        position: relative;
        margin-bottom: 8px;
        padding: 14px 14px 14px 16px;
        font-size: 0.82rem;
        cursor: pointer;
        color: var(--muted);
        border-radius: 14px;
        border: 1px solid transparent;
        background: rgba(15, 23, 42, 0.035);
        transition:
          background 0.22s ease,
          border-color 0.22s ease,
          color 0.22s ease,
          transform 0.22s ease,
          box-shadow 0.22s ease;
      }

      .theme-item::before {
        content: '';
        position: absolute;
        left: 0;
        top: 10px;
        bottom: 10px;
        width: 3px;
        border-radius: 0 4px 4px 0;
        background: linear-gradient(180deg, var(--accent), var(--accent-2));
        opacity: 0;
        transform: scaleY(0.6);
        transition:
          opacity 0.22s ease,
          transform 0.22s ease;
      }

      .theme-item:hover {
        background: rgba(255, 255, 255, 0.82);
        border-color: var(--border);
        color: var(--text);
        transform: translateX(4px);
        box-shadow:
          0 10px 28px rgba(15, 23, 42, 0.08),
          0 0 0 1px rgba(255, 255, 255, 0.9) inset;
      }

      .theme-item:hover::before {
        opacity: 0.55;
        transform: scaleY(1);
      }

      .theme-item:focus-visible {
        outline: none;
        border-color: rgba(79, 70, 229, 0.45);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.22);
      }

      .theme-item.active {
        background: linear-gradient(
          135deg,
          rgba(79, 70, 229, 0.12) 0%,
          rgba(14, 116, 144, 0.06) 100%
        );
        border-color: rgba(79, 70, 229, 0.28);
        color: var(--text);
        box-shadow:
          0 14px 36px rgba(15, 23, 42, 0.08),
          0 0 20px var(--accent-glow),
          0 0 0 1px rgba(255, 255, 255, 0.85) inset;
        transform: translateX(4px);
      }

      .theme-item.active::before {
        opacity: 1;
        transform: scaleY(1);
      }

      .theme-item .line {
        display: block;
      }

      .theme-item .head {
        font-weight: 700;
        color: var(--text);
        margin-bottom: 6px;
        font-size: 0.9rem;
        letter-spacing: -0.01em;
      }

      .theme-item.active .head {
        color: var(--text);
      }

      .theme-item .meta {
        font-size: 0.78rem;
        line-height: 1.5;
        opacity: 0.92;
        letter-spacing: 0.01em;
      }

      .preview-area {
        flex: 1;
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        height: 100vh;
        position: relative;
        background: var(--bg);
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .bottom-section {
        position: relative;
        z-index: 1;
        flex-shrink: 0;
        min-width: 0;
        min-height: 0;
        margin: 0;
        padding: 18px 16px 20px;
        border-top: none;
        border-left: 1px solid var(--border);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.72) 0%,
          rgba(248, 250, 252, 0.96) 100%
        );
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .bottom-section-inner {
        max-width: none;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: center;
        gap: 20px;
      }

      .bottom-section-main {
        flex: 0 1 auto;
        min-width: 0;
        width: 100%;
        text-align: center;
      }

      .bottom-section-title {
        margin: 0 0 10px;
        font-size: 0.62rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent-2);
        line-height: 1.4;
        text-align: center;
      }

      .bottom-section-networks {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        gap: 8px 8px;
        justify-content: center;
      }

      .bottom-section-networks li {
        margin: 0;
        padding: 6px 14px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: clamp(11px, 1.1vw, 14px);
        font-weight: 600;
        color: var(--network-chip-text);
        background: var(--network-chip-bg);
        border: 1px solid var(--network-chip-border);
        border-radius: 999px;
        letter-spacing: 0.02em;
        white-space: nowrap;
        box-shadow:
          0 4px 14px rgba(15, 23, 42, 0.06),
          0 0 0 1px rgba(79, 70, 229, 0.06) inset;
      }

      /* Как на https://files.alconost.com/rVUdrfuYUzclWyCA1wLSd — .badge svg, .badge img */
      .bottom-section-networks li svg,
      .bottom-section-networks li img {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        display: block;
        object-fit: contain;
      }

      .bottom-section-cta {
        flex: 0 1 auto;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        width: 100%;
      }

      .bottom-section-cta-lead {
        margin: 28px 0 0;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--text);
        text-align: center;
      }

      .bottom-section-cta-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        box-sizing: border-box;
        padding: 10px 18px;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        text-decoration: none;
        color: #0a0b10;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 28px var(--accent-glow);
        transition:
          transform 0.15s ease,
          filter 0.15s ease;
      }

      .bottom-section-cta-link:hover {
        filter: brightness(1.06);
        transform: translateY(-1px);
      }

      .bottom-section-cta-link:focus-visible {
        outline: 2px solid var(--accent-2);
        outline-offset: 3px;
      }

      .preview-area::before {
        content: '';
        position: absolute;
        /* inset: -20%; */
        background:
          radial-gradient(ellipse 55% 45% at 18% 22%, rgba(79, 70, 229, 0.14), transparent 55%),
          radial-gradient(ellipse 50% 40% at 88% 78%, rgba(14, 116, 144, 0.1), transparent 50%),
          radial-gradient(ellipse 70% 50% at 50% 100%, rgba(99, 102, 241, 0.08), transparent 55%);
        pointer-events: none;
        z-index: 0;
      }

      @media (prefers-reduced-motion: no-preference) {
        .preview-area::before {
          animation: showcase-float 18s ease-in-out infinite;
        }
      }

      .preview-area::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(15, 23, 42, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(15, 23, 42, 0.04) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(ellipse 75% 70% at 50% 45%, #000 20%, transparent 75%);
        pointer-events: none;
        z-index: 0;
        opacity: 0.5;
      }

      .preview-column {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        flex: 0 1 auto;
        width: 100%;
        min-height: 100%;
        padding: 12px 8px 14px;
        gap: 10px;
        border-right: none;
        align-self: stretch;
        box-sizing: border-box;
      }
      .preview-column:last-child {
        border-right: none;
      }

      .preview-label {
        text-align: center;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        color: var(--muted);
      }

      .preview-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 18px;
        align-self: center;
        flex-shrink: 0;
        margin-top: 16px;
      }

      .qr-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .qr-card {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        border-radius: 16px;
        border: 1px solid var(--border-strong);
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
      }

      .qr-card-canvas {
        width: 124px;
        height: 124px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        border-radius: 8px;
        overflow: hidden;
      }

      .qr-card-canvas canvas,
      .qr-card-canvas img,
      .qr-card-canvas svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .qr-card-canvas[data-state='loading']::after,
      .qr-card-canvas[data-state='error']::after {
        content: attr(data-message);
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--muted);
        text-align: center;
        padding: 0 6px;
      }

      .qr-card-caption {
        margin: 0;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--muted);
        text-align: center;
      }

      .btn-reload {
        font: inherit;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 18px;
        border-radius: 12px;
        border: 1px solid transparent;
        color: var(--text);
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        cursor: pointer;
        min-height: 44px;
        transition:
          background 0.2s ease,
          border-color 0.2s ease,
          color 0.2s ease,
          transform 0.2s cubic-bezier(0.34, 1.3, 0.64, 1),
          box-shadow 0.2s ease;
      }

      .btn-reload:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.28);
      }

      .btn-reload:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .btn-reload:disabled:hover {
        transform: none;
      }

      .btn-copy {
        gap: 8px;
        border: 1px solid var(--border-strong);
        background: rgba(255, 255, 255, 0.72);
        color: var(--text);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }

      .btn-copy .btn-copy-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: var(--accent-2);
      }

      .btn-copy:hover:not(:disabled) {
        border-color: rgba(14, 116, 144, 0.35);
        background: rgba(224, 242, 254, 0.65);
        color: var(--text);
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.1);
      }

      .btn-copy:hover:not(:disabled) .btn-copy-icon {
        color: #0e7490;
      }

      .btn-copy:active:not(:disabled) {
        transform: translateY(0);
      }

      .btn-copy-icon-svg {
        display: block;
        width: 17px;
        height: 17px;
      }

      .device-pair {
        flex: 0 1 auto;
        min-height: auto;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: clamp(16px, 3.5vw, 32px);
        width: 100%;
        box-sizing: border-box;
        margin: 0;
        padding: 18px 16px;
        border-radius: 22px;
        overflow: visible;
        /* container-type: size; */
        container-name: device-stage;
        border: 1px solid var(--device-stage-edge);
        background:
          radial-gradient(
            ellipse 90% 75% at 50% 44%,
            var(--device-stage-glow) 0%,
            transparent 58%
          ),
          radial-gradient(
            ellipse 130% 85% at 50% -5%,
            var(--device-stage-glow-soft) 0%,
            transparent 50%
          ),
          linear-gradient(168deg, #fbfcfe 0%, #f4f7fb 42%, #e9eef8 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.95),
          inset 0 0 0 1px rgba(15, 23, 42, 0.06),
          inset 0 -10px 28px rgba(15, 23, 42, 0.03),
          0 4px 22px rgba(15, 23, 42, 0.06);
      }

      .device-pair-unit {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        flex: 0 1 auto;
        min-width: 0;
      }

      .device-pair-unit .preview-label {
        margin: 0;
      }

      /*
       * Две простые рамки: iframe с реальными пропорциями (Pixi resizeTo → #game-container).
       */
      .preview-frame {
        flex: 0 0 auto;
        align-self: center;
        box-sizing: border-box;
        height: auto;
        overflow: hidden;
        border-radius: 32px;
        border: 10px solid #4f4f5a;
        background: #ffffff;
        filter: drop-shadow(0 14px 28px rgba(15, 23, 42, 0.16))
          drop-shadow(0 2px 8px rgba(15, 23, 42, 0.1));
        box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.07);
        position: relative;
      }

      /*
       * Up to two themes cached (LRU): portrait/landscape iframe pairs stay mounted for fast toggle.
       * A third theme evicts the least recently used pair; only [data-active] iframes are visible.
       */
      .preview-frame iframe {
        display: block;
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        background: #111;
        visibility: hidden;
        pointer-events: none;
      }

      .preview-frame iframe[data-active] {
        visibility: visible;
        pointer-events: auto;
        z-index: 1;
      }

      @keyframes shimmer-sweep {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }

      .skeleton-loader {
        position: absolute;
        inset: 0;
        z-index: 0;
        background: #1a1f2c;
        overflow: hidden;
      }

      .skeleton-loader::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          105deg,
          transparent 30%,
          rgba(255, 255, 255, 0.04) 44%,
          rgba(255, 255, 255, 0.08) 50%,
          rgba(255, 255, 255, 0.04) 56%,
          transparent 70%
        );
        animation: shimmer-sweep 2s ease-in-out infinite;
      }

      @media (prefers-reduced-motion: reduce) {
        .skeleton-loader::after {
          animation: none;
        }
      }

      .preview-frame--portrait {
        width: min(var(--phone-short-edge), 100%);
        max-width: min(380px, 100%);
        aspect-ratio: 9 / 16;
      }

      .preview-frame--landscape {
        width: min(var(--phone-long-edge), 100%);
        max-width: min(640px, 100%);
        aspect-ratio: 16 / 9;
      }

      @supports (width: min(1cqw, 100%)) {
        .preview-frame--portrait {
          width: min(var(--phone-short-edge), min(360px, 94cqw));
        }

        .preview-frame--landscape {
          width: min(var(--phone-long-edge), min(620px, 94cqw));
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .theme-item:hover,
        .theme-item.active {
          transform: none;
        }

        .preview-area::before {
          animation: none;
        }

        .btn-reload:hover:not(:disabled),
        .btn-reload:active:not(:disabled),
        .btn-copy:hover:not(:disabled),
        .btn-copy:active:not(:disabled) {
          transform: none;
        }

        .bottom-section-cta-link:hover {
          transform: none;
        }
      }

      /*

    <script>
      (function () {
        function formatBundleBytes(n) {
          if (typeof n !== 'number' || !isFinite(n) || n < 0) {
            return '';
          }
          if (n < 1024) {
            return n + ' B';
          }
          if (n < 1048576) {
            return (n / 1024).toFixed(n < 10240 ? 1 : 0) + ' KB';
          }
          return (n / 1048576).toFixed(n < 10485760 ? 1 : 0) + ' MB';
        }

        let SHOWCASE = {
          gameTitle: 'Playable Ad Roster',
          themes: [
            {
              id: 'default',
              head: '\u2699\uFE0F Default',

              meta:
                'Urban skyline · Pizza, coffee, cones',
              url: 'https://files.alconost.com/Hfp26Uh4hYgXhoxJwauEr',
              hidden: true,
            },
            {
              id: 'global_fiesta',
              head: '\uD83C\uDF89 Global fiesta',
              meta:
                'Global English & LATAM · Vibrant fiesta',
              url: 'https://files.alconost.com/w-5bg3ef2tf2KdE1R0Gnx',
            },
            {
              id: 'jp_kawaii',
              head: '\uD83C\uDF38 JP kawaii',
              meta:
                'Japanese market · Female 18–34 · Kawaii pastel',
              url: 'https://files.alconost.com/js1fyzrIncI9jnDXjTR22',
            },
            {
              id: 'kr_sea_pop',
              head: '\uD83C\uDFB6 KR sea pop',
              meta:
                'Korea & SEA · Ages 16–30 · K-pop & boba',
              url: 'https://files.alconost.com/BFuwUhLAxPRHyeXo9me1E',
            },
            {
              id: 'uk_pub',
              head: '\uD83C\uDF7B UK pub',
              meta:
                'UK & Ireland · Ages 18–30 · Pub culture',
              url: 'https://files.alconost.com/uNcjO9WHI-OXkQpU3OOhd',
            },
            {
              id: 'zh_urban',
              head: '\uD83C\uDFEF Zh urban',
              meta:
                'China (zh-CN) · Urban 18–35 · Modern festive',
              url: 'https://files.alconost.com/-DAX1ZqKmK18rA0kyTHLK',
            },
          ],
        };

        let listEl = document.getElementById('theme-list');
        let frameContainers = {
          portrait: document.getElementById('frame-portrait'),
          landscape: document.getElementById('frame-landscape'),
        };
        let btnOpenBuild = document.getElementById('btn-open-build-link');
        let qrCanvasEl = document.getElementById('qr-card-canvas');
        let activeEl = null;
        let activeBuildUrl = '';
        let activeThemeId = null;

        /**
         * At most two themes mounted (LRU): portrait + landscape iframe pair each. Keeps toggling A↔B
         * instant while bounding simultaneous WebGL runtimes; older mounts drop off when you open a third.
         */
        let MAX_MOUNTED_THEMES = 2;
        /** Most recently activated theme id first; tail is LRU eviction candidate. */
        let mountedThemeLruIds = [];
        let themeMounts = Object.create(null);
        let themeLoadStatus = Object.create(null);
        // URLs already pulled into HTTP cache, either by the background warmer (cache-only fetch)
        // or by a previous full iframe mount. Used to skip redundant work.
        let warmedUrls = Object.create(null);

        function buildIframe(t, orientation) {
          let iframe = document.createElement('iframe');
          iframe.setAttribute(
            'title',
            'Playable ' + orientation + ' \u2014 ' + (t.id || 'theme')
          );
          iframe.setAttribute('allow', 'autoplay; fullscreen');
          iframe.setAttribute('loading', 'eager');
          iframe.setAttribute('data-theme-id', t.id);
          if (orientation === 'portrait') {
            iframe.width = '390';
            iframe.height = '844';
          } else {
            iframe.width = '1280';
            iframe.height = '720';
          }
          return iframe;
        }

        function touchMountedTheme(id) {
          let ix = mountedThemeLruIds.indexOf(id);
          if (ix !== -1) mountedThemeLruIds.splice(ix, 1);
          mountedThemeLruIds.unshift(id);
        }

        function evictExcessMountedThemes() {
          while (mountedThemeLruIds.length > MAX_MOUNTED_THEMES) {
            let victim = mountedThemeLruIds[mountedThemeLruIds.length - 1];
            unmountTheme(victim);
          }
        }

        function unmountTheme(id) {
          let ix = mountedThemeLruIds.indexOf(id);
          if (ix !== -1) mountedThemeLruIds.splice(ix, 1);
          let rec = themeMounts[id];
          if (!rec || rec.alive === false) return;
          rec.alive = false;
          if (rec.landscapeStartTimer) {
            clearTimeout(rec.landscapeStartTimer);
            rec.landscapeStartTimer = null;
          }
          if (rec.portrait && rec.portrait.parentNode) {
            rec.portrait.parentNode.removeChild(rec.portrait);
          }
          if (rec.landscape && rec.landscape.parentNode) {
            rec.landscape.parentNode.removeChild(rec.landscape);
          }
          delete themeMounts[id];
          delete themeLoadStatus[id];
        }

        /**
         * Mount this theme's portrait+landscape iframes if not yet present. Returns the mount
         * record. Calls into onLoaded once both iframes have fired their load (or error) event so
         * the warmer can sequence one theme at a time.
         */
        function mountTheme(t, onLoaded) {
          let existing = themeMounts[t.id];
          if (existing) {
            if (typeof onLoaded === 'function') {
              if (themeLoadStatus[t.id] === 'loaded') {
                onLoaded();
              } else {
                let prev = existing.onLoadedCb;
                existing.onLoadedCb = function () {
                  if (typeof prev === 'function') prev();
                  onLoaded();
                };
              }
            }
            return existing;
          }

          let portrait = buildIframe(t, 'portrait');
          let landscape = buildIframe(t, 'landscape');
          let record = {
            portrait: portrait,
            landscape: landscape,
            portraitLoaded: false,
            landscapeLoaded: false,
            portraitGameReady: false,
            landscapeGameReady: false,
            landscapeStarted: false,
            onLoadedCb: typeof onLoaded === 'function' ? onLoaded : null,
            onPortraitReady: null,
            onLandscapeReady: null,
            alive: true,
            landscapeStartTimer: null,
          };
          themeMounts[t.id] = record;
          themeLoadStatus[t.id] = 'loading';

          function checkLoaded() {
            if (!record.alive) return;
            if (record.portraitLoaded && record.landscapeLoaded) {
              themeLoadStatus[t.id] = 'loaded';
              warmedUrls[t.url] = true;
              if (typeof record.onLoadedCb === 'function') {
                let cb = record.onLoadedCb;
                record.onLoadedCb = null;
                cb();
              }
            }
          }

          /**
           * Sequence portrait then landscape so we hit the network once. Once portrait fires
           * `load`/`error` (or a safety timeout elapses), the playable HTML is in HTTP cache and
           * landscape's fetch resolves from cache — and Pixi boot for landscape no longer has to
           * compete with portrait for CPU.
           */
          function startLandscape() {
            if (!record.alive || record.landscapeStarted) return;
            record.landscapeStarted = true;
            if (record.landscapeStartTimer) {
              clearTimeout(record.landscapeStartTimer);
              record.landscapeStartTimer = null;
            }
            landscape.src = t.url;
          }

          function markPortraitGameReady() {
            if (record.portraitGameReady) return;
            record.portraitGameReady = true;
            if (typeof record.onPortraitReady === 'function') { record.onPortraitReady(); record.onPortraitReady = null; }
          }
          function markLandscapeGameReady() {
            if (record.landscapeGameReady) return;
            record.landscapeGameReady = true;
            if (typeof record.onLandscapeReady === 'function') { record.onLandscapeReady(); record.onLandscapeReady = null; }
          }

          portrait.addEventListener('load', function () {
            if (!record.alive) return;
            record.portraitLoaded = true;
            startLandscape();
            checkLoaded();
            setTimeout(function () { if (record.alive) markPortraitGameReady(); }, 5000);
          });
          portrait.addEventListener('error', function () {
            if (!record.alive) return;
            record.portraitLoaded = true;
            markPortraitGameReady();
            startLandscape();
            checkLoaded();
          });
          landscape.addEventListener('load', function () {
            if (!record.alive) return;
            record.landscapeLoaded = true;
            checkLoaded();
            setTimeout(function () { if (record.alive) markLandscapeGameReady(); }, 5000);
          });
          landscape.addEventListener('error', function () {
            if (!record.alive) return;
            record.landscapeLoaded = true;
            markLandscapeGameReady();
            checkLoaded();
          });

          frameContainers.portrait.appendChild(portrait);
          frameContainers.landscape.appendChild(landscape);

          portrait.src = t.url;
          // Safety net: if portrait never fires load (e.g. very slow response, parsing stalled),
          // start landscape after 1.5s so we don't block the user-visible second preview forever.
          record.landscapeStartTimer = setTimeout(startLandscape, 1500);

          return record;
        }

        window.addEventListener('message', function (e) {
          if (!e.data || e.data.type !== 'playable-ready') return;
          var src = e.source;
          for (var id in themeMounts) {
            var rec = themeMounts[id];
            if (!rec || !rec.alive) continue;
            if (rec.portrait && rec.portrait.contentWindow === src) {
              rec.portraitGameReady = true;
              if (typeof rec.onPortraitReady === 'function') { rec.onPortraitReady(); rec.onPortraitReady = null; }
            }
            if (rec.landscape && rec.landscape.contentWindow === src) {
              rec.landscapeGameReady = true;
              if (typeof rec.onLandscapeReady === 'function') { rec.onLandscapeReady(); rec.onLandscapeReady = null; }
            }
          }
        });

        /**
         * Background warmer: walks every non-hidden theme in order and pulls the playable HTML
         * into the browser's HTTP cache via fetch(). We deliberately do NOT mount full iframes
         * here — that would spin up an extra Pixi runtime per theme and steal CPU from the active
         * preview. When the user later clicks an unvisited theme, the bytes are already cached so
         * the resulting iframe mount only pays the (single-threaded) Pixi boot cost.
         *
         * The warmer pauses while the user-visible active pair is still booting so we don't fight
         * for bandwidth during the most visible moment.
         */
        let warmerPaused = false;
        let warmerActive = false;
        let warmerAbort = null;

        function nextThemeToWarm() {
          for (var i = 0; i < SHOWCASE.themes.length; i++) {
            var t = SHOWCASE.themes[i];
            if (t.hidden) continue;
            if (!t.url || t.url === '#') continue;
            if (warmedUrls[t.url]) continue;
            return t;
          }
          return null;
        }

        function warmNext() {
          if (warmerPaused) {
            warmerActive = false;
            return;
          }
          var t = nextThemeToWarm();
          if (!t) {
            warmerActive = false;
            return;
          }
          warmerActive = true;

          var controller =
            typeof AbortController === 'function' ? new AbortController() : null;
          warmerAbort = controller;

          var opts = {
            mode: 'no-cors',
            credentials: 'omit',
            cache: 'default',
            // Hint browsers (Chromium-based) to use idle-priority for this background fetch.
            priority: 'low',
          };
          if (controller) opts.signal = controller.signal;

          function finish() {
            if (warmerAbort === controller) warmerAbort = null;
            warmedUrls[t.url] = true;
            // Short delay so the browser can decompress/cache the response between requests and
            // we don't saturate Stashy with back-to-back hits.
            setTimeout(warmNext, 150);
          }

          fetch(t.url, opts).then(finish).catch(function () {
            // Treat aborts as a pause — leave warmedUrls untouched so we retry later.
            if (warmerPaused) {
              warmerActive = false;
              return;
            }
            finish();
          });
        }

        function pauseWarmer() {
          warmerPaused = true;
          if (warmerAbort) {
            try {
              warmerAbort.abort();
            } catch (err) {
              /* noop */
            }
            warmerAbort = null;
          }
        }

        function resumeWarmer() {
          if (!warmerPaused && warmerActive) return;
          warmerPaused = false;
          if (!warmerActive) warmNext();
        }

        document.getElementById('game-title').textContent = SHOWCASE.gameTitle;

        function updateCopyButtonState() {
          let usable = activeBuildUrl && activeBuildUrl !== '#';
          btnOpenBuild.disabled = !usable;
        }

        /**
         * Render a QR for the given URL into the qr-card-canvas. Falls back gracefully if the
         * `qrcode-generator` script hasn't finished loading yet (retry on script load).
         */
        let qrInstance = null;
        let qrPendingUrl = null;

        function setQrState(state, message) {
          if (!qrCanvasEl) return;
          qrCanvasEl.setAttribute('data-state', state);
          qrCanvasEl.setAttribute('data-message', message || '');
        }

        function renderQr(url) {
          if (!qrCanvasEl) return;
          if (!url || url === '#') {
            qrCanvasEl.innerHTML = '';
            setQrState('error', 'No link');
            return;
          }
          if (typeof window.qrcode !== 'function') {
            qrPendingUrl = url;
            setQrState('loading', 'Loading\u2026');
            return;
          }
          try {
            // typeNumber 0 = auto-pick smallest size that fits, error correction "M" = balanced.
            let qr = window.qrcode(0, 'M');
            qr.addData(url);
            qr.make();
            // cellSize 4 + margin 2 → ~120px svg that scales to the 124px card.
            qrCanvasEl.innerHTML = qr.createSvgTag({ cellSize: 4, margin: 2, scalable: true });
            setQrState('ready', '');
            qrInstance = qr;
          } catch (err) {
            qrCanvasEl.innerHTML = '';
            setQrState('error', 'QR error');
          }
        }

        // Some browsers fire DOMContentLoaded before the deferred QR script executes.
        // Wait for `window.qrcode` if it's not yet available, then redraw any pending URL.
        if (typeof window.qrcode !== 'function') {
          let pollStart = Date.now();
          let pollId = setInterval(function () {
            if (typeof window.qrcode === 'function') {
              clearInterval(pollId);
              if (qrPendingUrl) renderQr(qrPendingUrl);
            } else if (Date.now() - pollStart > 6000) {
              clearInterval(pollId);
              if (qrPendingUrl) setQrState('error', 'QR unavailable');
            }
          }, 100);
        }

        /**
         * Reveal the requested theme's previews. LRU-retains two mounted pairs; opening a third evicts LRU.
         */
        function showTheme(row, t) {
          if (activeEl) activeEl.classList.remove('active');
          row.classList.add('active');
          activeEl = row;
          activeBuildUrl = t.url;
          activeThemeId = t.id;

          pauseWarmer();

          // Hide previously-active iframes (still needed when re-selecting the same theme).
          let prevPortrait = frameContainers.portrait.querySelector(
            'iframe[data-active]'
          );
          if (prevPortrait) prevPortrait.removeAttribute('data-active');
          let prevLandscape = frameContainers.landscape.querySelector(
            'iframe[data-active]'
          );
          if (prevLandscape) prevLandscape.removeAttribute('data-active');

          let mount = mountTheme(t, function () {
            if (activeThemeId === t.id) resumeWarmer();
          });

          var showTime = Date.now();
          var MIN_SHIMMER_MS = 600;

          function revealFrame(frame) {
            var elapsed = Date.now() - showTime;
            var delay = Math.max(0, MIN_SHIMMER_MS - elapsed);
            if (delay === 0) {
              if (activeThemeId === t.id) frame.setAttribute('data-active', '');
            } else {
              setTimeout(function () {
                if (activeThemeId === t.id) frame.setAttribute('data-active', '');
              }, delay);
            }
          }

          if (mount.portraitGameReady) {
            revealFrame(mount.portrait);
          } else {
            mount.onPortraitReady = function () { revealFrame(mount.portrait); };
          }

          if (mount.landscapeGameReady) {
            revealFrame(mount.landscape);
          } else {
            mount.onLandscapeReady = function () { revealFrame(mount.landscape); };
          }

          if (themeLoadStatus[t.id] === 'loaded') {
            resumeWarmer();
          }

          touchMountedTheme(t.id);
          evictExcessMountedThemes();

          renderQr(t.url);
          updateCopyButtonState();
        }

        let visibleThemes = SHOWCASE.themes.filter(function (t) {
          return !t.hidden;
        });

        visibleThemes.forEach(function (t, i) {
          let row = document.createElement('div');
          row.className = 'theme-item' + (i === 0 ? ' active' : '');
          row.setAttribute('role', 'listitem');
          row.setAttribute('tabindex', '0');

          let head = document.createElement('span');
          head.className = 'head line';
          head.textContent = t.head;

          let meta = document.createElement('span');
          meta.className = 'meta line';
          let sizePart = formatBundleBytes(t.bundleBytes);
          meta.textContent = sizePart ? t.meta + ' ' + sizePart : t.meta;

          row.appendChild(head);
          row.appendChild(meta);

          function activate() {
            showTheme(row, t);
          }

          row.addEventListener('click', activate);
          row.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              activate();
            }
          });

          listEl.appendChild(row);

          if (i === 0) {
            showTheme(row, t);
          }
        });

        btnOpenBuild.addEventListener('click', function () {
          if (!activeBuildUrl || activeBuildUrl === '#') return;
          window.open(activeBuildUrl, '_blank', 'noopener,noreferrer');
        });
      })();
    </script>
  </body>
</html>
